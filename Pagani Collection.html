<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Collezione — Pagani Database</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --carbon:#131417; --carbon2:#1b1d22; --panel:#202329; --line:#2e323a;
  --ivory:#ece5d8; --muted:#9a948a; --faint:#6b6760;
  --zonda:#c6a15b; --huayra:#7fa3c4; --utopia:#8fae8b;
  --display:'Marcellus', 'Times New Roman', serif;
  --body:'Inter', -apple-system, system-ui, sans-serif;
  --mono:'IBM Plex Mono', ui-monospace, monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scrollbar-color:#3a3f48 var(--carbon)}
body{background:var(--carbon);color:var(--ivory);font-family:var(--body);font-size:15px;line-height:1.55;
  background-image:
    repeating-linear-gradient(45deg, rgba(255,255,255,.012) 0 2px, transparent 2px 6px),
    repeating-linear-gradient(-45deg, rgba(0,0,0,.15) 0 2px, transparent 2px 6px);}
button{font-family:inherit;cursor:pointer}
:focus-visible{outline:2px solid var(--zonda);outline-offset:2px}
@media (prefers-reduced-motion: reduce){*,*::before,*::after{animation:none!important;transition:none!important}}

/* ---------- header ---------- */
header{max-width:1240px;margin:0 auto;padding:52px 28px 8px}
.kicker{font-family:var(--mono);font-size:11px;letter-spacing:.28em;color:var(--faint);text-transform:uppercase;display:flex;align-items:center;gap:14px}
.pipes{display:inline-flex;gap:4px}
.pipes i{width:8px;height:8px;border:1.5px solid var(--zonda);border-radius:50%;display:block}
.pipes i:nth-child(2),.pipes i:nth-child(3){transform:translateY(3px)}
h1{font-family:var(--display);font-size:clamp(38px,6vw,64px);font-weight:400;letter-spacing:.02em;margin-top:10px;line-height:1.05}
h1 em{font-style:normal;color:var(--zonda)}
.sub{color:var(--muted);max-width:64ch;margin-top:10px;font-size:14.5px}

/* ---------- controls ---------- */
.controls{max-width:1240px;margin:26px auto 0;padding:0 28px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.chip{background:transparent;border:1px solid var(--line);color:var(--muted);padding:7px 15px;border-radius:999px;font-size:13px;letter-spacing:.02em;transition:all .15s}
.chip:hover{border-color:var(--faint);color:var(--ivory)}
.chip.on{color:var(--carbon);font-weight:600}
.chip.on[data-f="all"]{background:var(--ivory);border-color:var(--ivory)}
.chip.on[data-f="Zonda"]{background:var(--zonda);border-color:var(--zonda)}
.chip.on[data-f="Huayra"]{background:var(--huayra);border-color:var(--huayra)}
.chip.on[data-f="Utopia"]{background:var(--utopia);border-color:var(--utopia)}
.chip.on[data-f="road"],.chip.on[data-f="track"]{background:var(--ivory);border-color:var(--ivory)}
.spacer{flex:1}
select,.search{background:var(--carbon2);border:1px solid var(--line);color:var(--ivory);border-radius:8px;padding:8px 12px;font-size:13px;font-family:var(--body)}
.search{width:210px}
.search::placeholder{color:var(--faint)}
.count{font-family:var(--mono);font-size:11px;color:var(--faint);letter-spacing:.1em}

/* ---------- grid ---------- */
.grid{max-width:1240px;margin:26px auto 90px;padding:0 28px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}
.card{background:var(--carbon2);border:1px solid var(--line);border-radius:10px;overflow:hidden;text-align:left;color:inherit;display:flex;flex-direction:column;transition:transform .18s, border-color .18s}
.card:hover{transform:translateY(-3px);border-color:var(--faint)}
.cover{aspect-ratio:16/9.5;position:relative;overflow:hidden;background:
  radial-gradient(120% 90% at 20% 0%, rgba(255,255,255,.06), transparent 55%),
  repeating-linear-gradient(45deg, #17181c 0 3px, #1d1f24 3px 6px)}
.cover img{width:100%;height:100%;object-fit:cover;display:block}
.cover .mono-mark{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:var(--display);font-size:64px;color:rgba(236,229,216,.10);letter-spacing:.05em;user-select:none}
.cover .fam-spine{position:absolute;left:0;top:0;bottom:0;width:4px}
.card[data-fam="Zonda"] .fam-spine{background:var(--zonda)}
.card[data-fam="Huayra"] .fam-spine{background:var(--huayra)}
.card[data-fam="Utopia"] .fam-spine{background:var(--utopia)}
.cbody{padding:15px 16px 16px;display:flex;flex-direction:column;gap:9px;flex:1}
.crow{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.cname{font-family:var(--display);font-size:19px;line-height:1.2}
.cyear{font-family:var(--mono);font-size:12px;color:var(--faint)}
.cstats{display:flex;gap:14px;font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:auto}
.cstats b{color:var(--ivory);font-weight:500}
.tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{font-size:10.5px;font-family:var(--mono);letter-spacing:.06em;padding:3px 8px;border-radius:4px;border:1px solid var(--line);color:var(--muted);text-transform:uppercase}
.tag.track{border-color:#8a4b4b;color:#d29090}
.tag.oneoff{border-color:#7a6a3f;color:var(--zonda)}

/* ---------- detail overlay ---------- */
.overlay{position:fixed;inset:0;background:rgba(10,11,13,.72);backdrop-filter:blur(6px);display:none;z-index:50;overflow-y:auto;padding:4vh 16px}
.overlay.open{display:block}
.sheet{max-width:920px;margin:0 auto;background:var(--carbon2);border:1px solid var(--line);border-radius:14px;overflow:hidden;position:relative}
.close{position:sticky;top:14px;margin-left:calc(100% - 54px);z-index:5;background:rgba(19,20,23,.85);border:1px solid var(--line);color:var(--ivory);width:38px;height:38px;border-radius:50%;font-size:17px;line-height:1}
.hero{aspect-ratio:16/8;position:relative;background:
  radial-gradient(120% 100% at 25% 0%, rgba(255,255,255,.07), transparent 55%),
  repeating-linear-gradient(45deg, #16171b 0 3px, #1c1e23 3px 6px);margin-top:-52px}
.hero img{width:100%;height:100%;object-fit:cover;display:block}
.hero .mono-mark{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:120px;color:rgba(236,229,216,.08)}
.hero .fam-band{position:absolute;left:0;right:0;bottom:0;height:3px}
.sheet[data-fam="Zonda"] .fam-band, .sheet[data-fam="Zonda"] .plaque-title{color:var(--zonda)} .sheet[data-fam="Zonda"] .fam-band{background:var(--zonda)}
.sheet[data-fam="Huayra"] .fam-band{background:var(--huayra)} .sheet[data-fam="Huayra"] .plaque-title{color:var(--huayra)}
.sheet[data-fam="Utopia"] .fam-band{background:var(--utopia)} .sheet[data-fam="Utopia"] .plaque-title{color:var(--utopia)}
.inner{padding:30px 34px 44px}
.dhead{display:flex;flex-wrap:wrap;align-items:baseline;gap:8px 16px;margin-bottom:6px}
.dname{font-family:var(--display);font-size:clamp(28px,4vw,40px);line-height:1.1}
.dmeta{font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:.08em}
.dtags{margin:8px 0 22px}

/* plaque */
.plaque{border:1px solid var(--line);border-radius:10px;background:
  linear-gradient(180deg, rgba(255,255,255,.03), rgba(0,0,0,.12));
  padding:20px 22px;margin-bottom:30px}
.plaque-title{font-family:var(--mono);font-size:10.5px;letter-spacing:.3em;text-transform:uppercase;margin-bottom:14px}
.pgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px 22px}
.pitem{border-left:1px solid var(--line);padding-left:12px}
.plab{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint)}
.pval{font-size:15px;margin-top:3px;line-height:1.35}
.pval.big{font-family:var(--display);font-size:22px}
.pwide{grid-column:1/-1}

/* prose */
.sect{margin-bottom:26px}
.sect h3{font-family:var(--display);font-weight:400;font-size:21px;letter-spacing:.02em;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.sect h3::after{content:"";flex:1;height:1px;background:var(--line)}
.sect p{color:#cfc9bd;max-width:74ch}

/* gallery */
.gal{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-top:12px}
.gitem{position:relative;aspect-ratio:4/3;border-radius:8px;overflow:hidden;border:1px solid var(--line)}
.gitem img{width:100%;height:100%;object-fit:cover;display:block}
.gdel{position:absolute;top:6px;right:6px;background:rgba(10,11,13,.8);border:1px solid var(--line);color:var(--ivory);border-radius:6px;width:26px;height:26px;font-size:13px;display:none}
.gitem:hover .gdel{display:block}
.addrow{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.addrow input{flex:1;min-width:220px;background:var(--carbon);border:1px solid var(--line);color:var(--ivory);border-radius:8px;padding:9px 12px;font-size:13px}
.addrow input::placeholder{color:var(--faint)}
.btn{background:var(--ivory);color:var(--carbon);border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:600}
.btn:hover{opacity:.9}
.hint{font-size:12px;color:var(--faint);margin-top:8px}
.gempty{font-size:13px;color:var(--faint);border:1px dashed var(--line);border-radius:8px;padding:16px;text-align:center;margin-top:12px}
.gfig{display:flex;flex-direction:column;gap:5px}
.gcredit{font-family:var(--mono);font-size:10.5px;color:var(--faint);line-height:1.4;cursor:text;min-height:15px}
.gcredit:hover{color:var(--muted)}
.gcredit.empty{font-style:italic}
.gcredit input{width:100%;background:var(--carbon);border:1px solid var(--line);color:var(--ivory);border-radius:6px;padding:5px 8px;font-size:11px;font-family:var(--mono)}
.hero-credit{position:absolute;right:10px;bottom:10px;background:rgba(10,11,13,.72);padding:4px 10px;border-radius:6px;font-family:var(--mono);font-size:10px;color:var(--muted);max-width:70%;text-overflow:ellipsis;white-space:nowrap;overflow:hidden}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--line);color:var(--ivory);padding:10px 18px;border-radius:10px;font-size:13px;display:none;z-index:99}
@media(max-width:640px){.inner{padding:22px 18px 34px}}
</style>
</head>
<body>

<header>
  <div class="kicker"><span class="pipes"><i></i><i></i><i></i><i></i></span> HYPERCAR ARCHIVE · SAN CESARIO SUL PANARO</div>
  <h1>La Collezione <em>Pagani</em></h1>
  <p class="sub">Every production model, limited edition, and significant one-off — 1999 to today. Open a card for the full build plaque, story, engineering, and photo gallery.</p>
</header>

<div class="controls">
  <button class="chip on" data-f="all">All</button>
  <button class="chip" data-f="Zonda">Zonda</button>
  <button class="chip" data-f="Huayra">Huayra</button>
  <button class="chip" data-f="Utopia">Utopia</button>
  <button class="chip" data-f="road">Road legal</button>
  <button class="chip" data-f="track">Track only</button>
  <span class="spacer"></span>
  <input class="search" id="q" type="text" placeholder="Search models…">
  <select id="sort">
    <option value="year">Sort · Year</option>
    <option value="hp">Sort · Horsepower</option>
    <option value="name">Sort · Name</option>
  </select>
  <span class="count" id="count"></span>
  <button class="chip" onclick="exportShareable()" title="Download a standalone copy with your photos baked in — send it to anyone">Share copy</button>
  <button class="chip" onclick="exportPhotos()" title="Download all photos + credits as a backup file">Backup</button>
  <button class="chip" onclick="document.getElementById('restorefile').click()" title="Restore photos from a backup file">Restore</button>
  <input id="restorefile" type="file" accept="application/json,.json" hidden onchange="importPhotos(this.files[0])">
</div>

<main class="grid" id="grid"></main>

<div class="overlay" id="overlay" role="dialog" aria-modal="true">
  <div class="sheet" id="sheet"></div>
</div>
<div class="toast" id="toast"></div>

<script>
/*SEED_SLOT*/
const PAGE_SRC = (()=>{ try{ return '<!DOCTYPE html>\n' + document.documentElement.outerHTML; }catch(e){ return null; } })();
const SEED = (typeof window.__SEED__ === 'object' && window.__SEED__) ? window.__SEED__ : null;

const CARS = [{"slug": "zonda-c12", "family": "Zonda", "manufacturer": "Pagani", "model": "Zonda C12", "year": 1999, "price": "~$320,000 (original retail)", "production": "5 (1 used for crash testing)", "engine": "6.0L NA V12 — Mercedes-Benz M120", "powertrain": "ICE, 6-speed manual", "hp": 394, "drivetrain": "RWD", "downforce": "Not published", "roadLegal": "Yes", "status": "Discontinued", "topSpeed": 185, "zeroSixty": 4.2, "torque": 420, "weight": 2756, "story": "The car that started it all. Horacio Pagani, a former Lamborghini composites chief who emigrated from Argentina, spent seven years building his dream car. It was originally to be called the 'Fangio F1' in honor of five-time F1 champion Juan Manuel Fangio, a fellow Argentine and mentor who personally helped Horacio secure Mercedes-Benz engines. When Fangio died in 1995, Horacio renamed the car 'Zonda' after the warm wind that blows down the Andes, feeling it would be wrong to put Fangio's name on a car he never saw finished. The 'C' honors Horacio's wife Cristina; 12 for the cylinders.", "engineering": "Debuted Pagani's signature carbon fiber construction at a time when most rivals still used aluminum. Powered by the Mercedes-Benz M120 V12 that Fangio helped arrange. Design inspired by jet fighters and the Sauber-Mercedes Group C Silver Arrows, including the now-iconic circular quad exhaust. The first chassis was used for crash testing and later restored in-house for the Zonda's 20th anniversary.", "records": "Stunned the 1999 Geneva Motor Show as a debut car from an unknown boutique manufacturer that could genuinely rival Ferrari and Lamborghini. Only 5 were built, making an original C12 one of the rarest and most historically significant Paganis."}, {"slug": "zonda-c12-s", "family": "Zonda", "manufacturer": "Pagani", "model": "Zonda C12 S", "year": 2000, "price": "~$350,000 (original retail)", "production": "15 (estimated)", "engine": "7.0L NA V12 — Mercedes-AMG M297", "powertrain": "ICE, 6-speed manual", "hp": 542, "drivetrain": "RWD", "downforce": "Not published", "roadLegal": "Yes", "status": "Discontinued", "topSpeed": 208, "zeroSixty": 3.7, "torque": 553, "weight": 2755, "story": "The rapid follow-up that proved the C12 was no fluke. Pagani asked AMG for more power, and they delivered a larger 7.0L version of the V12.", "engineering": "AMG-tuned M297 7.0L V12 with 542 hp mated to a 6-speed manual. Revised aerodynamics with a longer nose and new rear wing over the original C12.", "records": "Cemented Pagani's reputation among collectors; period reviews praised it as better built than contemporary Ferraris."}, {"slug": "zonda-s-7-3", "family": "Zonda", "manufacturer": "Pagani", "model": "Zonda S 7.3", "year": 2002, "price": "~$450,000 (original retail)", "production": "~17 (estimated)", "engine": "7.3L NA V12 — Mercedes-AMG M297", "powertrain": "ICE, 6-speed manual", "hp": 547, "drivetrain": "RWD", "downforce": "Not published", "roadLegal": "Yes", "status": "Discontinued", "topSpeed": 214, "zeroSixty": 3.7, "torque": 553, "weight": 2755, "story": "The Zonda hits its stride. The engine grew to the definitive 7.3L displacement — the same basic unit that would power Zondas for the next two decades.", "engineering": "The 7.3L M297 V12 (derived from the engine in the Mercedes SL 73 AMG) added traction control for the first time on a Zonda. Still a pure 6-speed manual with no flappy paddles.", "records": "The 7.3L M297 became one of the longest-serving and most beloved engines in hypercar history — Pagani was still building cars around it 20+ years later."}, {"slug": "zonda-roadster", "family": "Zonda", "manufacturer": "Pagani", "model": "Zonda Roadster", "year": 2003, "price": "~$667,000 (original retail)", "production": "40", "engine": "7.3L NA V12 — Mercedes-AMG M297", "powertrain": "ICE, 6-speed manual", "hp": 547, "drivetrain": "RWD", "downforce": "Not published", "roadLegal": "Yes", "status": "Discontinued", "topSpeed": 214, "zeroSixty": 3.7, "torque": 553, "weight": 2822, "story": "Pagani's first open-top car, created by popular demand and limited to 40 made-to-measure examples.", "engineering": "Remarkably, the roadster required minimal structural reinforcement thanks to the inherent stiffness of the carbon monocoque — it weighs only slightly more than the coupe. Removable carbon roof panel and canvas side curtains.", "records": "At 40 units it was one of the 'higher volume' Zondas — which ironically made it a favorite donor car for later one-off rebuilds by Pagani's factory."}, {"slug": "zonda-f", "family": "Zonda", "manufacturer": "Pagani", "model": "Zonda F", "year": 2005, "price": "~$741,000 (original retail)", "production": "25", "engine": "7.3L NA V12 — Mercedes-AMG M297", "powertrain": "ICE, 6-speed manual", "hp": 594, "drivetrain": "RWD", "downforce": "Not published", "roadLegal": "Yes", "status": "Discontinued", "topSpeed": 214, "zeroSixty": 3.5, "torque": 561, "weight": 2712, "story": "Widely considered the definitive Zonda. The 'F' honors Juan Manuel Fangio — the tribute Horacio had wanted to make since day one, finally realized in the car many call the greatest analog supercar ever built.", "engineering": "594 hp from the 7.3L V12 (641 hp with the Clubsport package), a 6-speed manual, hydraulic steering, and no stability control in its purest form. Revised aero with a new front end, additional headlight, and larger rear wing. Optional carbon-ceramic brakes — a first for Pagani.", "records": "Regularly tops 'greatest supercar of all time' lists. In 2007 a Zonda F Clubsport lapped the Nürburgring in 7:27.82 — a production car record at the time. Values have climbed toward $10M+ for the best examples."}, {"slug": "zonda-roadster-f", "family": "Zonda", "manufacturer": "Pagani", "model": "Zonda Roadster F", "year": 2006, "price": "~$825,000 (original retail)", "production": "25", "engine": "7.3L NA V12 — Mercedes-AMG M297", "powertrain": "ICE, 6-speed manual", "hp": 641, "drivetrain": "RWD", "downforce": "Not published", "roadLegal": "Yes", "status": "Discontinued", "topSpeed": 214, "zeroSixty": 3.4, "torque": 575, "weight": 2712, "story": "The open-top version of the definitive Zonda, limited to 25 units.", "engineering": "With the optional Clubsport package it made 641 hp while weighing the same as the coupe thanks to the carbon-titanium tub. Many consider it the ultimate expression of the analog V12 roadster.", "records": "One of the most valuable open Paganis; pristine examples trade well above $10M today."}, {"slug": "zonda-monza", "family": "Zonda", "manufacturer": "Pagani", "model": "Zonda Monza", "year": 2004, "price": "Undisclosed (one-off commission)", "production": "1", "engine": "7.3L NA V12 — Mercedes-AMG M297", "powertrain": "ICE, 6-speed sequential", "hp": 591, "drivetrain": "RWD", "downforce": "Track aero package (figures not published)", "roadLegal": "No", "status": "One-off", "topSpeed": "Not published", "zeroSixty": 3.3, "torque": 561, "weight": 2601, "story": "A one-off track special commissioned in 2004 by an American customer who wanted a Zonda with zero compromises for circuit use — a preview of the philosophy that later produced the Zonda R.", "engineering": "Based on the Zonda S 7.3 with a stripped interior, sequential-shift gearbox, revised engine tuning to 591 hp, and an aggressive fixed aero package.", "records": "Recognized as the first track-only Pagani, the conceptual grandfather of the Zonda R, Revolución, and Huayra R."}, {"slug": "zonda-cinque", "family": "Zonda", "manufacturer": "Pagani", "model": "Zonda Cinque", "year": 2009, "price": "~$1,460,000 (original retail)", "production": "5", "engine": "7.3L NA V12 — Mercedes-AMG M297", "powertrain": "ICE, 6-speed sequential", "hp": 669, "drivetrain": "RWD", "downforce": "~1,650 lbs @ 186 mph (est.)", "roadLegal": "Yes", "status": "Discontinued", "topSpeed": 217, "zeroSixty": 3.4, "torque": 575, "weight": 2668, "story": "Born when Pagani's Hong Kong dealer SPS begged the factory to build a road-legal version of the track-only Zonda R. Pagani agreed to just five cars — 'Cinque' is Italian for five. It was meant to be the Zonda's grand finale; instead, demand kept the Zonda alive for another decade.", "engineering": "The first car ever built with Carbo-Titanium — carbon fiber woven with titanium strands for greater strength, now a Pagani signature. Featured a 678 hp version of the 7.3L V12, a 6-speed sequential gearbox, active aerodynamics, and a roof scoop feeding the engine.", "records": "Introduced Carbo-Titanium to the world, arguably Pagani's single most important materials innovation. One of the most sought-after Zondas; examples have changed hands for well north of $5M."}, {"slug": "zonda-cinque-roadster", "family": "Zonda", "manufacturer": "Pagani", "model": "Zonda Cinque Roadster", "year": 2010, "price": "~$1,850,000 (original retail)", "production": "5", "engine": "7.3L NA V12 — Mercedes-AMG M297", "powertrain": "ICE, 6-speed sequential", "hp": 669, "drivetrain": "RWD", "downforce": "~1,650 lbs @ 186 mph (est.)", "roadLegal": "Yes", "status": "Discontinued", "topSpeed": 217, "zeroSixty": 3.4, "torque": 575, "weight": 2711, "story": "The open-air sister to the Cinque, also limited to five examples at the request of the same Hong Kong dealer.", "engineering": "Identical Carbo-Titanium construction and 678 hp drivetrain to the coupe, with a removable roof. Weight penalty over the coupe: almost nothing, thanks to the tub's stiffness.", "records": "One of only five — among the rarest and most valuable open-top Zondas in existence."}, {"slug": "zonda-tricolore", "family": "Zonda", "manufacturer": "Pagani", "model": "Zonda Tricolore", "year": 2010, "price": "~$1,600,000 (original retail)", "production": "3", "engine": "7.3L NA V12 — Mercedes-AMG M297", "powertrain": "ICE, 6-speed sequential", "hp": 670, "drivetrain": "RWD", "downforce": "Not published", "roadLegal": "Yes", "status": "Discontinued", "topSpeed": 217, "zeroSixty": 3.4, "torque": 575, "weight" /* ---------- storage (works in Claude and in a normal browser) ---------- */
const hasCloud = typeof window.storage !== 'undefined';

/* IndexedDB backend — used when the app runs outside Claude (e.g. the downloaded
   file opened in Chrome). Far larger capacity, so photos keep higher quality. */
let idb = null;
function openIDB(){
  return new Promise((res)=>{
    try{
      const rq = indexedDB.open('pagani-collection', 1);
      rq.onupgradeneeded = ()=> rq.result.createObjectStore('kv');
      rq.onsuccess = ()=> res(rq.result);
      rq.onerror = ()=> res(null);
      rq.onblocked = ()=> res(null);
    }catch(e){ res(null); }
  });
}
function idbOp(mode, fn){
  return new Promise((res)=>{
    if(!idb) return res(undefined);
    try{
      const tx = idb.transaction('kv', mode);
      const rq = fn(tx.objectStore('kv'));
      rq.onsuccess = ()=> res(rq.result);
      rq.onerror = ()=> res(undefined);
    }catch(e){ res(undefined); }
  });
}

const store = {
  async get(k){
    if(hasCloud){ try{ const r = await window.storage.get(k); return r ? r.value : null; }catch(e){ return null; } }
    if(idb){ const v = await idbOp('readonly', s=>s.get(k)); return v === undefined ? null : v; }
    try{ return localStorage.getItem(k); }catch(e){ return null; }
  },
  async set(k,v){
    if(hasCloud){ try{ const r = await window.storage.set(k,v); return !!r; }catch(e){ return false; } }
    if(idb){ let ok = true; await new Promise((res)=>{ try{
        const tx = idb.transaction('kv','readwrite');
        tx.objectStore('kv').put(v,k);
        tx.oncomplete = ()=> res(); tx.onerror = ()=>{ ok=false; res(); }; tx.onabort = ()=>{ ok=false; res(); };
      }catch(e){ ok=false; res(); } });
      return ok;
    }
    try{ localStorage.setItem(k,v); return true; }catch(e){ return false; }
  },
  async del(k){
    if(hasCloud){ try{ await window.storage.delete(k); }catch(e){} return; }
    if(idb){ await idbOp('readwrite', s=>s.delete(k)); return; }
    try{ localStorage.removeItem(k); }catch(e){}
  }
};

/* Higher quality when we have room (outside Claude / IndexedDB mode) */
const bigStorage = ()=> !hasCloud;
const MAXDIM = ()=> bigStorage() ? 1800 : 1280;
const QUAL   = ()=> bigStorage() ? 0.88 : 0.82;
const CAR_BUDGET = ()=> bigStorage() ? 60*1024*1024 : 4.6*1024*1024;

const COVERS_KEY = 'pagani-covers-v2';
const carKey = slug => 'pagani-photos-v2:' + slug;
let covers = {};            // slug -> small thumbnail dataURL (for cards)
let currentPhotos = [];     // photos of the currently open car

async function loadCovers(){
  const v = await store.get(COVERS_KEY);
  if(v){ try{ covers = JSON.parse(v); }catch(e){ covers = {}; } }
  if(SEED && SEED.covers) covers = Object.assign({}, SEED.covers, covers);
  render();
}
async function saveCovers(){
  const ok = await store.set(COVERS_KEY, JSON.stringify(covers));
  if(!ok) toast('Could not save the cover thumbnail — the shared cover index may be full.');
  return ok;
}

/* ---------- image compression ---------- */
function fileToImage(file){
  // Read via FileReader -> data URL. blob: object URLs can be blocked by the
  // sandbox this app runs in, so we avoid them entirely.
  return new Promise((res, rej)=>{
    const reader = new FileReader();
    reader.onerror = ()=> rej(new Error('read failed'));
    reader.onload = ()=>{
      const img = new Image();
      img.onload = ()=> res(img);
      img.onerror = ()=> rej(new Error('not a decodable image'));
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}
function shrink(img, maxDim, quality){
  const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
  const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
  const cv = document.createElement('canvas'); cv.width = w; cv.height = h;
  cv.getContext('2d').drawImage(img, 0, 0, w, h);
  return cv.toDataURL('image/jpeg', quality);
}
function shrinkFromDataURL(dataUrl, maxDim, quality){
  return new Promise((res)=>{
    const img = new Image();
    img.onload = ()=> res(shrink(img, maxDim, quality));
    img.onerror = ()=> res(null);
    img.src = dataUrl;
  });
}

function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block';
  clearTimeout(t._h); t._h=setTimeout(()=>t.style.display='none', 3200); }


let fFam='all', fLegal=null, q='', sort='year';

function visible(){
  let list = CARS.filter(c=>{
    if(fFam!=='all' && c.family!==fFam) return false;
    if(fLegal==='road' && c.roadLegal!=='Yes') return false;
    if(fLegal==='track' && c.roadLegal!=='No') return false;
    if(q && !c.model.toLowerCase().includes(q)) return false;
    return true;
  });
  list.sort((a,b)=> sort==='hp' ? b.hp-a.hp : sort==='name' ? a.model.localeCompare(b.model) : a.year-b.year);
  return list;
}

function isOneOff(c){ return /one-off/i.test(c.status) || /^1\b/.test(String(c.production)); }

function cardHTML(c){
  const ph = covers[c.slug];
  const cover = ph ? `<img src="${esc(ph)}" alt="${esc(c.model)}" loading="lazy" onerror="this.remove()">`
                   : `<div class="mono-mark">${esc(initials(c))}</div>`;
  return `<button class="card" data-fam="${c.family}" onclick="openCar('${c.slug}')">
    <div class="cover"><span class="fam-spine"></span>${cover}</div>
    <div class="cbody">
      <div class="crow"><span class="cname">${esc(c.model)}</span><span class="cyear">${c.year}</span></div>
      <div class="tags">
        ${c.roadLegal==='No' ? '<span class="tag track">Track only</span>' : ''}
        ${isOneOff(c) ? '<span class="tag oneoff">One-off</span>' : ''}
      </div>
      <div class="cstats"><span><b>${c.hp}</b> hp</span><span><b>${c.weight.toLocaleString()}</b> lbs</span><span><b>${c.zeroSixty}</b>s 0-60</span></div>
    </div>
  </button>`;
}

function initials(c){
  const m = c.model.replace(/^Zonda |^Huayra |^Utopia ?/,'');
  return m ? m.split(' ')[0].slice(0,6) : c.family;
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

function render(){
  const list = visible();
  document.getElementById('grid').innerHTML = list.map(cardHTML).join('');
  document.getElementById('count').textContent = list.length + ' / ' + CARS.length + ' cars';
}

function plaqueItem(lab,val,cls=''){ return `<div class="pitem ${cls}"><div class="plab">${lab}</div><div class="pval ${cls?'':''}">${esc(val)}</div></div>`; }

let currentSlug=null;
async function openCar(slug){
  currentSlug = slug;
  const c = CARS.find(x=>x.slug===slug);
  let ph = [];
  const raw = await store.get(carKey(slug));
  if(raw){ try{ ph = JSON.parse(raw); }catch(e){ ph = []; } }
  else if(SEED && SEED.photos && SEED.photos[slug]) ph = SEED.photos[slug].slice();
  ph = ph.map(p => typeof p === 'string' ? {src:p, credit:''} : p);   // migrate old format
  if(currentSlug !== slug) return;   // user closed/switched while loading
  currentPhotos = ph;
  const hero = ph[0] ? `<img src="${esc(ph[0].src)}" alt="${esc(c.model)}" onerror="this.remove()">`
                       + (ph[0].credit ? `<div class="hero-credit">${esc(ph[0].credit)}</div>` : '')
                     : `<div class="mono-mark">${esc(initials(c))}</div>`;
  const gal = ph.length ? `<div class="gal">`+ph.map((p,i)=>
      `<div class="gfig">
        <div class="gitem"><img src="${esc(p.src)}" onerror="this.parentElement.style.opacity=.35" alt="photo ${i+1}">
          <button class="gdel" title="Remove photo" onclick="delPhoto(${i})">✕</button></div>
        <div class="gcredit ${p.credit?'':'empty'}" id="credit-${i}" onclick="editCredit(${i})">${p.credit ? esc(p.credit) : 'Add credit / license…'}</div>
      </div>`).join('')+`</div>`
    : `<div class="gempty">No photos yet — add some from your device below.</div>`;

  document.getElementById('sheet').dataset.fam = c.family;
  document.getElementById('sheet').innerHTML = `
    <button class="close" onclick="closeCar()" aria-label="Close">✕</button>
    <div class="hero">${hero}<span class="fam-band"></span></div>
    <div class="inner">
      <div class="dhead">
        <span class="dname">${esc(c.model)}</span>
        <span class="dmeta">${c.year} · ${esc(c.manufacturer).toUpperCase()}</span>
      </div>
      <div class="tags dtags">
        ${c.roadLegal==='No' ? '<span class="tag track">Track only</span>' : '<span class="tag">Road legal</span>'}
        ${isOneOff(c) ? '<span class="tag oneoff">One-off</span>' : ''}
        <span class="tag">${esc(c.status)}</span>
      </div>

      <div class="plaque">
        <div class="plaque-title">Build Plaque · Specifications</div>
        <div class="pgrid">
          ${plaqueItem('Horsepower', c.hp + ' hp','big')}
          ${plaqueItem('Torque', c.torque + ' lb-ft','big')}
          ${plaqueItem('Weight (dry)', c.weight.toLocaleString() + ' lbs','big')}
          ${plaqueItem('0–60 mph', c.zeroSixty + ' s','big')}
          ${plaqueItem('Top speed', typeof c.topSpeed==='number' ? c.topSpeed+' mph' : c.topSpeed,'big')}
          ${plaqueItem('Drivetrain', c.drivetrain)}
          ${plaqueItem('Engine', c.engine,'pwide')}
          ${plaqueItem('Powertrain', c.powertrain,'pwide')}
          ${plaqueItem('Downforce', c.downforce,'pwide')}
          ${plaqueItem('Price', c.price,'pwide')}
          ${plaqueItem('Production', c.production,'pwide')}
        </div>
      </div>

      <div class="sect"><h3>The Story</h3><p>${esc(c.story)}</p></div>
      <div class="sect"><h3>Engineering</h3><p>${esc(c.engineering)}</p></div>
      <div class="sect"><h3>Records &amp; Claims to Fame</h3><p>${esc(c.records)}</p></div>

      <div class="sect"><h3>Photos</h3>
        ${gal}
        <div class="addrow">
          <input id="pfile" type="file" accept="image/*" multiple hidden onchange="addPhotos(this.files)">
          <button class="btn" onclick="document.getElementById('pfile').click()">Add photos from device</button>
          <span id="pbusy" class="hint" style="display:none;align-self:center">Compressing…</span>
        </div>
        <div class="hint">Save any photo to your device first, then add it here — photos are compressed and stored inside the app. Click the line under a photo to add its credit (photographer, license, source); the first photo's credit also shows on the hero image.</div>
      </div>
    </div>`;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeCar(){ document.getElementById('overlay').classList.remove('open'); document.body.style.overflow=''; currentSlug=null; render(); }

async function addPhotos(files){
  if(!files || !files.length) return;
  const busy = document.getElementById('pbusy');
  if(busy) busy.style.display = 'inline';
  const slug = currentSlug;
  let added = 0;
  for(const f of files){
    try{
      const img = await fileToImage(f);
      currentPhotos.push({src: shrink(img, MAXDIM(), QUAL()), credit: ''});
      added++;
    }catch(e){ toast('Skipped \u201c' + f.name + '\u201d — couldn\u2019t decode it. JPG, PNG, and WebP work best; HEIC (iPhone default) may need converting.'); }
  }
  if(added){
    const json = JSON.stringify(currentPhotos);
    if(json.length > CAR_BUDGET()){
      currentPhotos.splice(currentPhotos.length - added, added);
      toast('This car\u2019s gallery is full — remove a photo before adding more.');
    } else {
      const ok = await store.set(carKey(slug), json);
      if(!ok){ currentPhotos.splice(currentPhotos.length - added, added); toast('Could not save photos — storage may be full.'); }
      else {
        covers[slug] = await shrinkFromDataURL(currentPhotos[0].src, 220, 0.55);
        await saveCovers();
      }
    }
  }
  if(busy) busy.style.display = 'none';
  if(currentSlug === slug) redrawOpenCar();
}
async function delPhoto(i){
  const slug = currentSlug;
  currentPhotos.splice(i,1);
  if(currentPhotos.length){
    await store.set(carKey(slug), JSON.stringify(currentPhotos));
    covers[slug] = await shrinkFromDataURL(currentPhotos[0].src, 220, 0.55);
  } else {
    if(SEED && SEED.photos && SEED.photos[slug]) await store.set(carKey(slug), '[]');
    else await store.del(carKey(slug));
    delete covers[slug];
  }
  await saveCovers();
  if(currentSlug === slug) redrawOpenCar();
}
function editCredit(i){
  const el = document.getElementById('credit-' + i);
  if(!el || el.querySelector('input')) return;
  const cur = currentPhotos[i].credit || '';
  el.classList.remove('empty');
  el.innerHTML = `<input type="text" value="${esc(cur)}" placeholder="e.g. Photo: Alex Penfold, CC BY 2.0, Wikimedia Commons" maxlength="300">`;
  const inp = el.querySelector('input');
  inp.focus(); inp.select();
  let done = false;
  const commit = async ()=>{
    if(done) return; done = true;
    const v = inp.value.trim();
    currentPhotos[i].credit = v;
    const ok = await store.set(carKey(currentSlug), JSON.stringify(currentPhotos));
    if(!ok) toast('Could not save credit — storage may be full.');
    redrawOpenCar();
  };
  inp.addEventListener('keydown', e=>{
    if(e.key === 'Enter') commit();
    if(e.key === 'Escape'){ done = true; redrawOpenCar(); }
    e.stopPropagation();   // don't let Escape close the sheet while editing
  });
  inp.addEventListener('blur', commit);
}

function redrawOpenCar(){
  // re-render the open sheet from currentPhotos without re-fetching
  const slug = currentSlug;
  const saved = currentPhotos;
  const origGet = store.get;
  store.get = async(k)=> k===carKey(slug) ? JSON.stringify(saved) : origGet.call(store,k);
  openCar(slug).finally(()=>{ store.get = origGet; });
}

async function gatherAll(){
  const out = { covers: covers, photos: {} };
  for(const c of CARS){
    const raw = await store.get(carKey(c.slug));
    if(raw){
      try{ const arr = JSON.parse(raw); if(arr.length) out.photos[c.slug] = arr; }catch(e){}
    } else if(SEED && SEED.photos && SEED.photos[c.slug]){
      out.photos[c.slug] = SEED.photos[c.slug];
    }
  }
  return out;
}

async function exportShareable(){
  if(!PAGE_SRC){ toast('Couldn\u2019t read the app\u2019s own source in this environment.'); return; }
  toast('Building shareable copy\u2026');
  const data = await gatherAll();
  const n = Object.keys(data.photos).length;
  let src = PAGE_SRC;
  // strip any previous seed
  const s = src.indexOf('/*SEED_START*/'), e = src.indexOf('/*SEED_END*/');
  if(s !== -1 && e !== -1) src = src.slice(0, s) + src.slice(e + '/*SEED_END*/'.length);
  // inject fresh seed at the slot
  const seedJS = '/*SEED_START*/window.__SEED__=' + JSON.stringify(data).replace(/<\//g,'<\\/') + ';/*SEED_END*/';
  src = src.replace('/*SEED_SLOT*/', '/*SEED_SLOT*/' + seedJS);
  try{
    const blob = new Blob([src], {type:'text/html'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'Pagani Collection (shared).html';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
    const mb = (blob.size/1048576).toFixed(1);
    toast('Shareable copy ready — ' + n + ' galleries baked in, ' + mb + ' MB.');
  }catch(e){ toast('Could not create the file in this environment.'); }
}

async function exportPhotos(){
  toast('Gathering photos\u2026');
  const out = { app:'pagani-collection', version:1, exported:new Date().toISOString(), covers:{}, photos:{} };
  out.covers = covers;
  for(const c of CARS){
    const raw = await store.get(carKey(c.slug));
    if(raw){ try{ const arr = JSON.parse(raw); if(arr.length) out.photos[c.slug] = arr; }catch(e){} }
  }
  const n = Object.keys(out.photos).length;
  if(!n){ toast('No photos to back up yet.'); return; }
  try{
    const blob = new Blob([JSON.stringify(out)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'pagani-photos-backup.json';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
    toast('Backup ready — ' + n + ' car galleries exported.');
  }catch(e){ toast('Could not create the backup file in this environment.'); }
}

async function importPhotos(file){
  if(!file) return;
  let data;
  try{ data = JSON.parse(await file.text()); }
  catch(e){ toast('That file isn\u2019t a valid backup.'); return; }
  if(!data || data.app !== 'pagani-collection' || !data.photos){ toast('That file isn\u2019t a Pagani Collection backup.'); return; }
  let ok = 0, failed = 0;
  for(const [slug, arr] of Object.entries(data.photos)){
    if(!CARS.some(c=>c.slug===slug)) continue;
    const saved = await store.set(carKey(slug), JSON.stringify(arr));
    if(saved){
      ok++;
      if(arr[0] && arr[0].src) covers[slug] = await shrinkFromDataURL(arr[0].src, 220, 0.55);
    } else failed++;
  }
  await saveCovers();
  render();
  toast(failed ? ('Restored ' + ok + ' galleries; ' + failed + ' didn\u2019t fit in storage.')
               : ('Restored ' + ok + ' car galleries.'));
  document.getElementById('restorefile').value = '';
}

document.querySelectorAll('.chip').forEach(ch=>{
  if(!ch.dataset.f) return;   // Backup/Restore buttons are not filters
  ch.addEventListener('click',()=>{
    const f = ch.dataset.f;
    if(f==='road'||f==='track'){
      if(fLegal===f){fLegal=null;ch.classList.remove('on');}
      else{fLegal=f;document.querySelectorAll('.chip[data-f=road],.chip[data-f=track]').forEach(x=>x.classList.remove('on'));ch.classList.add('on');}
    } else {
      fFam=f;
      document.querySelectorAll('.chip[data-f=all],.chip[data-f=Zonda],.chip[data-f=Huayra],.chip[data-f=Utopia]').forEach(x=>x.classList.remove('on'));
      ch.classList.add('on');
    }
    render();
  });
});
document.getElementById('q').addEventListener('input',e=>{q=e.target.value.toLowerCase();render();});
document.getElementById('sort').addEventListener('change',e=>{sort=e.target.value;render();});
document.getElementById('overlay').addEventListener('click',e=>{ if(e.target.id==='overlay') closeCar(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape' && currentSlug) closeCar(); });

(async()=>{
  if(!hasCloud) idb = await openIDB();
  render();
  loadCovers();
})();
</script>
